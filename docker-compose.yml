services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ring-rtsp-mosquitto
    restart: unless-stopped
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - ./mosquitto-data:/mosquitto/data
      - ./mosquitto-log:/mosquitto/log

  ring-mqtt:
    image: tsightler/ring-mqtt
    container_name: ring-rtsp-bridge
    restart: unless-stopped
    depends_on:
      - mosquitto
    ports:
      - "55123:55123"
      - "${RING_RTSP_PORT:-8554}:8554"
    volumes:
      - ./ring-mqtt-data:/data
    logging:
      options:
        max-size: 10m
        max-file: "3"
