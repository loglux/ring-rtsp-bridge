services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: ring-rtsp-mosquitto
    restart: unless-stopped
    # Config embedded in command — avoids bind mount issues on ASUSTOR
    command:
      - sh
      - -c
      - |
        echo 'listener 1883' > /tmp/mq.conf
        echo 'allow_anonymous true' >> /tmp/mq.conf
        echo 'persistence true' >> /tmp/mq.conf
        echo 'persistence_location /mosquitto/data/' >> /tmp/mq.conf
        echo 'log_dest stdout' >> /tmp/mq.conf
        exec mosquitto -c /tmp/mq.conf
    volumes:
      - mosquitto-data:/mosquitto/data
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "hc", "-W", "3"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  ring-mqtt:
    image: tsightler/ring-mqtt:5.9.3
    container_name: ring-rtsp-bridge
    restart: unless-stopped
    depends_on:
      mosquitto:
        condition: service_healthy
    ports:
      - "55123:55123"
      - "${RING_RTSP_PORT:-8554}:8554"
    volumes:
      - ring-mqtt-data:/data
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 8554 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      options:
        max-size: 10m
        max-file: "3"

  frigate:
    image: ghcr.io/blakeblackshear/frigate:stable@sha256:1724960349dad0bd2ae8ec884171a6fd5755a4dc242a0e66cadbda9c0e85c99b
    container_name: ring-frigate
    restart: unless-stopped
    depends_on:
      ring-mqtt:
        condition: service_healthy
      mosquitto:
        condition: service_healthy
    ports:
      - "5000:5000"
      - "8971:8971"
    shm_size: "160m"
    tmpfs:
      - /tmp/cache
    volumes:
      - frigate-config:/config
      - frigate-clips:/media/frigate
      - /etc/localtime:/etc/localtime:ro
    environment:
      - FRIGATE_RTSP_USER=${RING_RTSP_USER:-stream_user}
      - FRIGATE_RTSP_PASSWORD=${RING_RTSP_PASS:-change_me}
      - FRIGATE_CAMERA_ID=${RING_CAMERA_ID}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:5000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      options:
        max-size: 10m
        max-file: "3"

  # Filtered Docker API proxy — exposes only container read + restart to admin.
  # Prevents admin from accessing the full Docker socket (privilege escalation risk).
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: ring-docker-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - CONTAINERS=1
      - POST=1
      - LOG_LEVEL=warning
    networks:
      - proxy-net

  admin:
    build: ./admin
    container_name: ring-admin
    restart: unless-stopped
    depends_on:
      - docker-proxy
      - ring-mqtt
      - frigate
    ports:
      - "8085:8090"
    environment:
      - DOCKER_HOST=tcp://docker-proxy:2375
    volumes:
      - ring-mqtt-data:/ring-mqtt-data
      - frigate-config:/frigate-config
      - frigate-clips:/media/frigate
    networks:
      - default
      - proxy-net
    logging:
      options:
        max-size: 5m
        max-file: "2"

volumes:
  mosquitto-data:
  ring-mqtt-data:
  frigate-config:
  frigate-clips:

networks:
  default: {}
  # Isolated network shared only between admin and the Docker proxy.
  proxy-net:
    internal: true
