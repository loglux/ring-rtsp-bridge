<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ring Bridge — Sign in</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          sans: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'ui-monospace', 'monospace'],
        }
      }}
    }
  </script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    input:focus { outline: none; box-shadow: 0 0 0 2px rgba(56,189,248,0.3); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease both; }
  </style>
</head>

<body class="bg-[#09090b] min-h-screen flex items-center justify-center px-4 antialiased"
      x-data="{show: false}">

  <div class="w-full max-w-sm fade-up">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 rounded-2xl bg-gradient-to-br from-sky-400 to-sky-600 flex items-center justify-center shadow-lg shadow-sky-500/20 ring-1 ring-sky-300/20 mx-auto mb-5">
        <svg class="w-7 h-7 text-zinc-950" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10l4.553-2.069A1 1 0 0121 8.882v6.236a1 1 0 01-1.447.894L15 14M3 8a2 2 0 012-2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8z"/>
        </svg>
      </div>
      <p class="font-mono font-bold text-xl tracking-tight text-zinc-100">RING<span class="text-sky-400">·</span>BRIDGE</p>
      <p class="text-[11px] uppercase tracking-[0.2em] text-zinc-500 mt-1.5 font-semibold">Surveillance Console</p>
    </div>

    <!-- Error -->
    {% if error %}
    <div class="mb-4 px-4 py-3 rounded-xl bg-red-500/10 border border-red-500/20 text-sm text-red-400 text-center font-medium">
      Incorrect password — try again
    </div>
    {% endif %}

    <!-- Card -->
    <div style="background:#1a1e2e;border:1px solid rgba(255,255,255,0.09);box-shadow:0 4px 32px rgba(0,0,0,0.5)"
         class="rounded-2xl p-6">
      <form method="POST" action="/login">
        <label class="block text-[11px] font-bold uppercase tracking-[0.18em] text-zinc-400 mb-2">
          Password
        </label>
        <div class="relative mb-5">
          <input name="password" :type="show ? 'text' : 'password'" autofocus
                 style="background:#0d1020;border:1px solid rgba(255,255,255,0.12)"
                 class="w-full px-4 py-3 rounded-xl text-sm text-zinc-100 font-mono placeholder-zinc-600 transition-all"
                 placeholder="Enter admin password">
          <button type="button" @click="show=!show" tabindex="-1"
                  class="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-500 hover:text-zinc-300 transition-colors p-1">
            <svg x-show="!show" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg x-show="show" class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
        <button type="submit"
                class="w-full py-3 bg-sky-500 hover:bg-sky-400 active:bg-sky-600 text-zinc-950 font-bold text-sm rounded-xl transition-colors">
          Sign in →
        </button>
      </form>
    </div>

    <p class="text-center mt-5 text-xs text-zinc-600">
      Password not set yet?
      <a href="/setup" class="text-sky-500 hover:text-sky-400 transition-colors">Run setup wizard</a>
    </p>

  </div>
</body>
</html>
